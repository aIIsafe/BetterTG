name: Build BetterTG IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "BetterTG/**"
      - "BetterTG.xcodeproj/**"
      - "generate_secret.py"
      - ".github/workflows/build-ipa.yml"
      - "ci/**"

concurrency:
  group: build-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Secret.swift
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          if [[ -z "$TELEGRAM_API_ID" || -z "$TELEGRAM_API_HASH" ]]; then
            echo "::error::Add TELEGRAM_API_ID and TELEGRAM_API_HASH repository secrets."
            exit 1
          fi
          python3 generate_secret.py "$TELEGRAM_API_ID" "$TELEGRAM_API_HASH"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned IPA
        run: |
          chmod +x ci/build-unsigned-ipa.sh
          ci/build-unsigned-ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterTG-ipa
          path: ${{ runner.temp }}/BetterTG-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
