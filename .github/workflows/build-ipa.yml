name: Build BetterTG IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "BetterTG/**"
      - "BetterTG.xcodeproj/**"
      - "generate_secret.py"
      - ".github/workflows/build-ipa.yml"
      - "ci/**"

concurrency:
  group: build-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Secret.swift
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          if [[ -z "$TELEGRAM_API_ID" || -z "$TELEGRAM_API_HASH" ]]; then
            echo "::error::Add TELEGRAM_API_ID and TELEGRAM_API_HASH repository secrets."
            exit 1
          fi
          python3 generate_secret.py "$TELEGRAM_API_ID" "$TELEGRAM_API_HASH"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$BUILD_CERTIFICATE_BASE64" ]]; then
            echo "::error::Signing secrets are missing. See ci/SETUP_SIGNING.txt"
            exit 1
          fi
          chmod +x ci/import-certificate.sh
          ci/import-certificate.sh

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project BetterTG.xcodeproj \
            -scheme BetterTG

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PRODUCT_BUNDLE_IDENTIFIER: ${{ secrets.PRODUCT_BUNDLE_IDENTIFIER }}
        run: |
          if [[ -z "$APPLE_TEAM_ID" || -z "$PRODUCT_BUNDLE_IDENTIFIER" ]]; then
            echo "::error::Add APPLE_TEAM_ID and PRODUCT_BUNDLE_IDENTIFIER repository secrets."
            exit 1
          fi

          xcodebuild archive \
            -project BetterTG.xcodeproj \
            -scheme BetterTG \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/BetterTG.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$PRODUCT_BUNDLE_IDENTIFIER" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_NAME" \
            IPHONEOS_DEPLOYMENT_TARGET=17.0

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PRODUCT_BUNDLE_IDENTIFIER: ${{ secrets.PRODUCT_BUNDLE_IDENTIFIER }}
        run: |
          chmod +x ci/make-export-options.sh
          ci/make-export-options.sh

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/BetterTG.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterTG-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
          retention-days: 14
